<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reproductor - Netflix Clone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .video-container { position: relative; width: 100vw; height: 100vh; }
    video { width: 100%; height: 100%; object-fit: contain; }
    
    /* Overlay UI */
    .overlay { transition: opacity 0.3s ease; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 15%, transparent 85%, rgba(0,0,0,0.8) 100%); pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; }
    .video-container:hover .overlay { opacity: 1; }
    
    /* Active Elements inside overlay */
    .overlay-top, .overlay-bottom { pointer-events: auto; padding: 25px 40px; }
    .back-btn { font-size: 2rem; color: #fff; text-decoration: none; transition: transform 0.2s; }
    .back-btn:hover { transform: scale(1.1); color: #fff; }
    .title-text { font-size: 1.5rem; font-weight: bold; margin-left: 20px; }
    
    .controls-btn { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; transition: transform 0.1s; }
    .controls-btn:hover { transform: scale(1.2); }
    .progress { height: 4px; background-color: rgba(255,255,255,0.3); border-radius: 2px; cursor: pointer; flex-grow: 1; margin: 0 20px; position: relative; overflow: visible;}
    .progress-bar-fill { height: 100%; background-color: #e50914; width: 15%; position: relative;}
    .progress-bar-fill::after { content: ''; position: absolute; right: -6px; top: -4px; width: 12px; height: 12px; background: red; border-radius: 50%; opacity: 0; transition: opacity 0.2s; }
    .progress:hover .progress-bar-fill::after { opacity: 1; }
  </style>
</head>
<body>

  <div class="video-container" id="videoContainer">
    <!-- Muestra corta de video open source alojada en googleapis -->
    <video id="player" autoplay controlsList="nodownload">
      <source src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4" type="video/mp4">
    </video>

    <div class="overlay" id="overlayUI">
      <div class="overlay-top d-flex align-items-center">
        <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="title-text">Reproduciendo película seleccionada...</div>
      </div>
      
      <div class="overlay-bottom">
        <div class="d-flex align-items-center mb-3">
          <span class="text-white small me-3">12:04</span>
          <div class="progress">
            <div class="progress-bar-fill"></div>
          </div>
          <span class="text-white small ms-3">1:42:30</span>
        </div>
        
        <div class="d-flex align-items-center justify-content-between">
          <div class="d-flex gap-4">
            <button class="controls-btn" id="playPause"><i class="fa-solid fa-pause"></i></button>
            <button class="controls-btn"><i class="fa-solid fa-backward-10"></i></button>
            <button class="controls-btn"><i class="fa-solid fa-forward-10"></i></button>
            <button class="controls-btn"><i class="fa-solid fa-volume-high"></i></button>
          </div>
          <div class="d-flex gap-4">
            <button class="controls-btn"><i class="fa-solid fa-closed-captioning"></i></button>
            <button class="controls-btn"><i class="fa-solid fa-gauge-high"></i></button>
            <button class="controls-btn" id="fullscreen"><i class="fa-solid fa-expand"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Lógica básica del reproductor simulado
    const video = document.getElementById('player');
    const playPauseBtn = document.getElementById('playPause');
    const fullscreenBtn = document.getElementById('fullscreen');
    
    // Auto-ocultar UI si no hay movimiento
    let timeout;
    const overlay = document.getElementById('overlayUI');
    document.addEventListener('mousemove', () => {
      overlay.style.opacity = '1';
      document.body.style.cursor = 'default';
      clearTimeout(timeout);
      timeout = setTimeout(() => {
        overlay.style.opacity = '0';
        document.body.style.cursor = 'none';
      }, 3000);
    });

    playPauseBtn.addEventListener('click', () => {
      if (video.paused) {
        video.play();
        playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
      } else {
        video.pause();
        playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
      }
    });

    fullscreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        fullscreenBtn.innerHTML = '<i class="fa-solid fa-compress"></i>';
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
          fullscreenBtn.innerHTML = '<i class="fa-solid fa-expand"></i>';
        }
      }
    });
  </script>
</body>
</html>
