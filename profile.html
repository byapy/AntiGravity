<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfiles - Netflix Clone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-netflix text-light fw-medium d-flex flex-column min-vh-100">

  <!-- Header simple -->
  <nav class="navbar navbar-expand-lg fixed-top transition-navbar" id="mainNav">
    <div class="container-fluid px-4 px-md-5">
      <a class="navbar-brand text-danger fs-3 fw-bold" href="index.html">NETFLIX</a>
    </div>
  </nav>

  <!-- Contenido de Perfiles -->
  <main class="flex-grow-1 d-flex justify-content-center align-items-center flex-column pt-5 mt-5">
    <h1 class="display-4 fw-normal mb-5 text-center text-white">¿Quién está viendo ahora?</h1>
    
    <div class="d-flex flex-wrap justify-content-center gap-4 gap-md-5 mb-5 profiles-container">
      
      <!-- Profile 1 -->
      <a href="index.html" class="text-decoration-none text-light-gray profile-card">
        <div class="profile-icon rounded mb-2 transition-transform shadow-sm" style="background-image: url('https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png'); width: 150px; height: 150px; background-size: cover; border: 3px solid transparent;"></div>
        <p class="text-center fs-5 profile-name">Bryan</p>
      </a>

      <!-- Profile 2 -->
      <a href="index.html" class="text-decoration-none text-light-gray profile-card">
        <div class="profile-icon rounded mb-2 transition-transform shadow-sm" style="background-color: #e50914; width: 150px; height: 150px; border: 3px solid transparent; display:flex; align-items:center; justify-content:center;">
            <i class="fa-solid fa-face-smile fs-1 text-white"></i>
        </div>
        <p class="text-center fs-5 profile-name">Invitado</p>
      </a>

      <!-- Profile 3 -->
      <a href="index.html" class="text-decoration-none text-light-gray profile-card">
        <div class="profile-icon rounded mb-2 transition-transform shadow-sm" style="background-color: #2F80ED; width: 150px; height: 150px; border: 3px solid transparent; display:flex; align-items:center; justify-content:center;">
            <i class="fa-solid fa-user-astronaut fs-1 text-white"></i>
        </div>
        <p class="text-center fs-5 profile-name">Niños</p>
      </a>

      <!-- Add Profile -->
      <a href="#" class="text-decoration-none text-light-gray profile-card">
        <div class="profile-icon rounded mb-2 transition-transform d-flex justify-content-center align-items-center" style="width: 150px; height: 150px; border: 3px solid transparent;">
           <i class="fa-solid fa-circle-plus" style="font-size: 5rem; color: gray;"></i>
        </div>
        <p class="text-center fs-5 profile-name">Agregar perfil</p>
      </a>

    </div>

    <button class="btn btn-outline-secondary px-4 py-2 mt-4 text-light text-uppercase fw-semibold fs-5 tracking-wide manage-btn">Administrar perfiles</button>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
